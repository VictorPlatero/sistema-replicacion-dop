<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Replicar Tabla</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        .item { background: #334155; margin: 10px; padding: 20px; border-radius: 10px; color: white; text-decoration: none; width: 300px; text-align: center; }
        .item:hover { background: #4ade80; color: #000; }
    </style>
</head>
<body>
    <h2>¿Qué tabla deseas replicar?</h2>
    {% for t in tablas %}
        <a href="/ejecutar_replicacion/{{ tipo }}/{{ destino }}/{{ t }}" class="item">REPLICAR: {{ t }}</a>
    {% endfor %}
</body>
</html>
