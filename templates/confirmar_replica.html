<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head>
<body>
    <div class="container">
        <h1>¿Qué tabla deseas replicar?</h1>
        <form action="/ejecutar_replicacion" method="POST">
            <input type="hidden" name="origen" value="{{ origen }}">
            <input type="hidden" name="destino" value="{{ destino }}">
            <button type="submit" class="card" style="width: 100%; font-size: 1.3rem;">
                REPLICAR: {{ tabla }}
            </button>
        </form>
        <a href="/seleccionar_destino/{{ origen }}" class="btn-back">← Volver</a>
    </div>
</body>
</html>
