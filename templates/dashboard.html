<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Panel - {{ tipo.upper() }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1 style="color: #3498db;">Panel de Control</h1>
        <h2>Base de Datos: {{ tipo.upper() }}</h2>
        <p>Conectado al host: <b>{{ host }}</b></p>
        
        <div class="card-grid">
            <a href="/explorar/{{ tipo }}" class="card">
                <div class="icon">🔍</div>
                <span>Explorar Tablas</span>
            </a>

            <a href="/" class="card">
                <div class="icon">🔁</div>
                <span>Cambiar BD</span>
            </a>

            <a href="/" class="card">
                <div class="icon">🚪</div>
                <span>Salir</span>
            </a>
        </div>
    </div>
</body>
</html>
