<!DOCTYPE html>
<html>
<head>
    <title>Panel de Operaciones</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2 style="color: var(--accent-blue)">Servidor: {{ host }}</h2>
        <div class="card-grid">
            <a href="/explorar/{{ tipo }}" class="card">
                <div class="icon">🔍</div>
                <span>Explorar</span>
            </a>
            <a href="/seleccionar_destino/{{ tipo }}" class="card">
                <div class="icon">🔄</div>
                <span>Replicar</span>
            </a>
            <a href="/" class="card">
                <span>Cambiar BD</span>
            </a>
            <a href="/" class="card" style="color: #e74c3c;">
                <span>Salir</span>
            </a>
        </div>
    </div>
</body>
</html>
