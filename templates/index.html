<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOP Replicator | SPA</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Conexiones</h2>
                <button id="btn-add-conn" class="btn btn-primary">+ Agregar</button>
            </div>
            <div id="tree-container" class="tree-container">
                <!-- Conexiones y Tablas cargadas dinámicamente aquí -->
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header/Toolbar -->
            <header class="toolbar">
                <h1>Panel de Replicación</h1>
                <div class="transfer-controls">
                    <label for="dest-select">Destino:</label>
                    <select id="dest-select">
                        <option value="">-- Seleccionar --</option>
                    </select>
                    <button id="btn-start-transfer" class="btn btn-success" disabled>Iniciar Replicación</button>
                </div>
            </header>

            <!-- Status Area -->
            <section class="status-area">
                <div class="status-card">
                    <h3>Origen Seleccionado</h3>
                    <p id="lbl-origen">Ninguno</p>
                </div>
                <div class="status-card">
                    <h3>Tablas a Replicar</h3>
                    <p id="lbl-tablas-count">0</p>
                </div>
            </section>

            <!-- Console -->
            <section class="console-section">
                <h3>Consola de Progreso</h3>
                <div id="console-output" class="console-output">
                    <p class="log-info">Esperando acción...</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal Agregar Conexión -->
    <div id="modal-add-conn" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Nueva Conexión</h2>
                <span class="close-modal">&times;</span>
            </div>
            
            <div class="tab-container">
                <button type="button" class="tab-btn active" data-tab="remota">Nube (Remota)</button>
                <button type="button" class="tab-btn" data-tab="local">Local (Vía SSH)</button>
            </div>

            <form id="form-add-conn">
                <input type="hidden" id="tipo_conexion" name="tipo_conexion" value="remota">
                
                <div class="form-group">
                    <label>Nombre Identificador</label>
                    <input type="text" name="name" placeholder="Ej. Producción Nube" required>
                </div>
                
                <div id="ssh-group" style="display: none; background: #f9f9f9; padding: 10px; border-radius: 4px; border: 1px solid #e0e0e0; margin-bottom: 15px;">
                    <h3 style="font-size: 14px; margin-bottom: 10px; color: #555;">Credenciales Servidor (SSH)</h3>
                    <div class="form-group">
                        <label>SSH Host</label>
                        <input type="text" id="ssh_host" name="ssh_host" placeholder="bastion.empresa.com">
                    </div>
                    <div class="form-group">
                        <label>SSH Usuario</label>
                        <input type="text" id="ssh_user" name="ssh_user">
                    </div>
                    <div class="form-group">
                        <label>SSH Contraseña</label>
                        <input type="password" id="ssh_password" name="ssh_password">
                    </div>
                    <div class="form-group">
                        <label>SSH Puerto</label>
                        <input type="number" id="ssh_port" name="ssh_port" value="22">
                    </div>
                </div>

                <div id="mysql-group">
                    <h3 style="font-size: 14px; margin-bottom: 10px; color: #555;">Credenciales Base de Datos (MySQL)</h3>
                    <div class="form-group">
                        <label>Host MySQL</label>
                        <input type="text" id="mysql_host" name="host" required>
                    </div>
                    <div class="form-group">
                        <label>Usuario</label>
                        <input type="text" name="user" required>
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" name="password" required>
                    </div>
                    <div class="form-group">
                        <label>Puerto MySQL</label>
                        <input type="number" name="port" value="3306" required>
                    </div>
                    <div class="form-group">
                        <label>Nombre de BD</label>
                        <input type="text" name="database" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width:100%; margin-top: 15px;">Guardar Conexión</button>
            </form>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
