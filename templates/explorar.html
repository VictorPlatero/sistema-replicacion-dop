<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<div class="container">
    <h1>Tablas en {{ tipo.upper() }}</h1>
    <div class="card-grid">
        {% for tabla in tablas %}
        <div class="card">
            <div class="icon">📊</div>
            <h3 style="margin: 10px 0;">{{ tabla }}</h3>
            <a href="/ver_datos/{{ tipo }}/{{ tabla }}" class="btn-back" style="color:#4ade80;">Ver Datos</a>
            <a href="/seleccionar_destino/{{ tipo }}/{{ tabla }}" class="btn-back">Replicar Tabla</a>
        </div>
        {% endfor %}
    </div>
    <a href="/dashboard/{{ tipo }}" class="btn-back">← Volver</a>
</div>
