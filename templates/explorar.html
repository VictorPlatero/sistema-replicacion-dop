<!DOCTYPE html>
<html>
<head>
    <title>Tablas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="data-panel">
            <h1>Tablas en {{ tipo|capitalize }}</h1>
            <div class="card-grid">
                {% for tabla in tablas %}
                <a href="/ver_datos/{{ tipo }}/{{ tabla }}" class="card" style="width: 100%; padding: 15px;">
                    <span>📊 {{ tabla }}</span>
                </a>
                {% endfor %}
            </div>
            <br>
            <a href="/dashboard/{{ tipo }}" class="btn-back">← Volver</a>
        </div>
    </div>
</body>
</html>
