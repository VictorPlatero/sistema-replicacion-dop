<!DOCTYPE html>
<html>
<head>
    <title>Explorar Tablas</title>
</head>
<body>
    <h1>Tablas encontradas en: {{ tipo }}</h1>
    <ul>
    {% for tabla in tablas %}
        <li>{{ tabla }}</li>
    {% else %}
        <li>No hay tablas en esta base de datos.</li>
    {% endfor %}
    </ul>
    <a href="/">Volver al menú principal</a>
</body>
</html>
