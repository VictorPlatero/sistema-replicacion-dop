<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Configurar Servidor Externo</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; width: 350px; border: 1px solid rgba(255,255,255,0.1); }
        h2 { text-align: center; color: #38bdf8; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #38bdf8; border: none; border-radius: 10px; color: #0f172a; font-weight: bold; cursor: pointer; font-size: 1rem; }
        button:hover { background: #7dd3fc; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Conexión Manual</h2>
        <p style="font-size: 0.9rem; color: #94a3b8; text-align: center;">Ingrese los datos del servidor externo</p>
        <form action="/configurar_externo/{{ modo }}" method="POST">
            <input type="text" name="host" placeholder="Host (ej: proxy.rlwy.net)" required>
            <input type="text" name="user" placeholder="Usuario" required>
            <input type="password" name="password" placeholder="Contraseña" required>
            <input type="number" name="port" placeholder="Puerto" required>
            <input type="text" name="database" placeholder="Nombre de Base de Datos" required>
            <button type="submit">Establecer Conexión</button>
        </form>
        <div style="text-align: center; margin-top: 15px;">
            <a href="/" style="color: #94a3b8; text-decoration: none; font-size: 0.9rem;">Cancelar</a>
        </div>
    </div>
</body>
</html>
