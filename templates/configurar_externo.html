<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Conectar Externo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="main-wrapper">
        <h1>=== CONFIGURAR CONEXIÓN EXTERNA ===</h1>
        
        <form action="/conectar_externo" method="POST" class="glass-form">
            <div class="input-group">
                <label>Host:</label>
                <input type="text" name="host" placeholder="gondola.proxy.rlwy.net" required>
            </div>
            <div class="input-group">
                <label>Usuario:</label>
                <input type="text" name="user" placeholder="root" required>
            </div>
            <div class="input-group">
                <label>Contraseña:</label>
                <input type="password" name="password" required>
            </div>
            <div class="input-group">
                <label>Puerto:</label>
                <input type="number" name="port" placeholder="30514" required>
            </div>
            <div class="input-group">
                <label>Base de Datos:</label>
                <input type="text" name="database" placeholder="railway" required>
            </div>
            <button type="submit" class="btn-connect">Establecer Conexión</button>
        </form>

        <a href="/" class="btn-back">Cancelar</a>
    </div>
</body>
</html>
